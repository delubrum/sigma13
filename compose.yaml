services:
    laravel.test:
        build:
            context: .
            dockerfile: docker/Dockerfile # Cámbialo a 'docker/Dockerfile' si lo moviste
        image: 'sigma13/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
            - '443:443'
            - '443:443/udp' # Vital para HTTP/3 en FrankenPHP
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            OCTANE_SERVER: frankenphp
            WATCH_RELOAD: 'true' 
            PHP_INI_SCAN_DIR: /usr/local/etc/php/conf.d
            DB_HOST: pgsql
            REDIS_HOST: valkey
            MEILISEARCH_HOST: http://meilisearch:7700
            AWS_ENDPOINT: http://minio:9000
        volumes:
            - .:/var/www/html:delegated
        working_dir: /var/www/html
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
            meilisearch:
                condition: service_healthy
            valkey:
                condition: service_healthy

    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE:-sigma}'
            POSTGRES_USER: '${DB_USERNAME:-sigma}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-sigma}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
            retries: 3
            timeout: 5s

    valkey:
        image: 'valkey/valkey:8.0-alpine'
        ports:
            - '${FORWARD_VALKEY_PORT:-6379}:6379'
        volumes:
            - 'sail-valkey:/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "valkey-cli", "ping"]
            retries: 3
            timeout: 5s

    meilisearch:
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: 'true'
            MEILI_MASTER_KEY: '${MEILISEARCH_KEY:-masterKey}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
            retries: 3
            timeout: 5s

    minio:
        image: 'minio/minio:latest'
        ports:
            - '${FORWARD_MINIO_PORT:-9000}:9000'
            - '${FORWARD_MINIO_CONSOLE_PORT:-8900}:8900'
        environment:
            MINIO_ROOT_USER: sail
            MINIO_ROOT_PASSWORD: password
        volumes:
            - 'sail-minio:/data'
        networks:
            - sail
        command: 'minio server /data --console-address ":8900"'
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            retries: 3
            timeout: 5s

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-meilisearch:
        driver: local
    sail-valkey:
        driver: local
    sail-minio:
        driver: local